<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoreo Electoral ONPE - 20 Puntos</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f7fafc; margin: 0; padding: 20px; color: #2d3748; }
        .container { max-width: 1100px; margin: 0 auto; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h1 { color: #1a365d; text-align: center; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #718096; margin-bottom: 25px; font-size: 14px; }
        .config-card { background-color: #ebf8ff; border: 1px solid #bee3f8; padding: 15px; border-radius: 6px; margin-bottom: 20px; }
        input[type="text"] { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #cbd5e0; border-radius: 4px; box-sizing: border-box; background-color: #edf2f7; color: #4a5568; }
        .actions-bar { display: flex; gap: 15px; margin-bottom: 25px; }
        button { flex: 1; padding: 12px; font-weight: bold; border: none; border-radius: 4px; cursor: pointer; color: white; font-size: 14px; transition: background 0.2s; }
        .btn-update { background-color: #3182ce; } .btn-update:hover { background-color: #2b6cb0; }
        .btn-excel { background-color: #38a169; } .btn-excel:hover { background-color: #2f855a; }
        .canvas-holder { position: relative; height: 400px; margin-bottom: 30px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; text-align: center; }
        th, td { padding: 10px; border-bottom: 1px solid #e2e8f0; font-size: 14px; }
        th { background-color: #edf2f7; color: #4a5568; }
        .badge { padding: 3px 8px; border-radius: 12px; font-size: 11px; font-weight: bold; }
        .synced { background-color: #c6f6d5; color: #22543d; }
        .pending { background-color: #feebc8; color: #744210; }
    </style>
</head>
<body>

<div class="container">
    <h1>Análisis de Avance Electoral (ONPE)</h1>
    <p class="subtitle">Seguimiento en curva de los últimos 20 estados de actualización y enlace automático a Google Sheets</p>

    <div class="config-card">
        <label style="font-weight: bold; color: #2c5282;">URL de Google Apps Script Vinculada:</label>
        <input type="text" id="scriptUrl" value="https://script.google.com/macros/s/AKfycbwhlSowE4bYiMGed4wL89w99DeHrblbTuXdKghtH8l4oussy8WLIzYQ6vkxhNB0RZT5/exec" readonly>
    </div>

    <div class="actions-bar">
        <button class="btn-update" onclick="adquirirNuevaActualizacion()">🔄 Capturar / Simular Actualización</button>
        <button class="btn-excel" onclick="transferirDatosAGoogleExcel()">📤 Exportar Pendientes a Google Excel</button>
    </div>

    <div class="canvas-holder">
        <canvas id="graficoOnpe"></canvas>
    </div>

    <h3>Registro de Datos (Últimas 20 Transmisiones)</h3>
    <table id="tablaDatos">
        <thead>
            <tr>
                <th>Iteración</th>
                <th>Fecha y Hora</th>
                <th>% Actas Procesadas</th>
                <th>% Candidato A</th>
                <th>% Candidato B</th>
                <th>Estado Sincronización</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script>
    // Inicialización del arreglo histórico guardado en el navegador (Máximo 20 elementos)
    let registrosOnpe = JSON.parse(localStorage.getItem('registros_onpe_data')) || [
        { id: 1, fecha: "09/06/2026 12:00", actas: 94.10, candA: 50.15, candB: 49.85, sync: true },
        { id: 2, fecha: "09/06/2026 13:00", actas: 95.30, candA: 50.08, candB: 49.92, sync: true },
        { id: 3, fecha: "09/06/2026 14:00", actas: 96.75, candA: 49.97, candB: 50.03, sync: false }
    ];

    let chartObjeto;

    function iniciarComponenteGrafico() {
        const ctx = document.getElementById('graficoOnpe').getContext('2d');
        
        chartObjeto = new Chart(ctx, {
            type: 'line',
            data: {
                labels: registrosOnpe.map(r => r.fecha.split(' ')[1]), // Extrae solo la hora para el eje horizontal
                datasets: [
                    {
                        label: '% Actas Procesadas',
                        data: registrosOnpe.map(r => r.actas),
                        borderColor: '#3182ce',
                        backgroundColor: 'rgba(49,130,206,0.05)',
                        tension: 0.4, // Suaviza la curva
                        yAxisID: 'yActas'
                    },
                    {
                        label: '% Votos Candidato A',
                        data: registrosOnpe.map(r => r.candA),
                        borderColor: '#e53e3e',
                        tension: 0.4,
                        yAxisID: 'yVotos'
                    },
                    {
                        label: '% Votos Candidato B',
                        data: registrosOnpe.map(r => r.candB),
                        borderColor: '#dd6b20',
                        tension: 0.4,
                        yAxisID: 'yVotos'
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    yActas: { type: 'linear', position: 'left', title: { display: true, text: 'Progreso de Actas (%)' }, min: 85, max: 100 },
                    yVotos: { type: 'linear', position: 'right', title: { display: true, text: 'Votos Válidos (%)' }, min: 45, max: 55, grid: { drawOnChartArea: false } }
                }
            }
        });
    }

    function renderizarTabla() {
        const tbody = document.querySelector("#tablaDatos tbody");
        tbody.innerHTML = "";
        
        // Muestra los registros ordenados desde el más reciente arriba
        [...registrosOnpe].reverse().forEach(r => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${r.id}</td>
                <td>${r.fecha}</td>
                <td><b>${r.actas}%</b></td>
                <td style="color:#e53e3e">${r.candA}%</td>
                <td style="color:#dd6b20">${r.candB}%</td>
                <td><span class="badge ${r.sync ? 'synced' : 'pending'}">${r.sync ? 'En Excel' : 'Pendiente'}</span></td>
            `;
            tbody.appendChild(row);
        });
    }

    function adquirirNuevaActualizacion() {
        const anterior = registrosOnpe[registrosOnpe.length - 1];
        if (anterior.actas >= 100) { alert("El conteo simulado ha finalizado al 100%."); return; }

        const fechaActual = new Date();
        const fechaTexto = `${fechaActual.toLocaleDateString('es-PE')} ${fechaActual.toTimeString().substring(0,5)}`;
        
        // Simulación controlada con incrementos reales según comportamiento de curvas de la ONPE
        const saltoActas = parseFloat((Math.random() * (1.1 - 0.3) + 0.3).toFixed(2));
        const nuevasActas = Math.min(100, parseFloat((anterior.actas + saltoActas).toFixed(2)));
        
        const variacionPorcentual = parseFloat((Math.random() * (0.12 - (-0.12)) + (-0.12)).toFixed(2));
        const nuevoA = parseFloat((anterior.candA + variacionPorcentual).toFixed(2));
        const nuevoB = parseFloat((100 - nuevoA).toFixed(2));

        registrosOnpe.push({
            id: anterior.id + 1,
            fecha: fechaTexto,
            actas: nuevasActas,
            candA: nuevoA,
            candB: nuevoB,
            sync: false
        });

        // RESTRICCIÓN CLAVE: Mantener únicamente los últimos 20 puntos en la curva
        if (registrosOnpe.length > 20) { registrosOnpe.shift(); }

        localStorage.setItem('registros_onpe_data', JSON.stringify(registrosOnpe));
        
        // Recargar datos en el gráfico en tiempo real
        chartObjeto.data.labels = registrosOnpe.map(r => r.fecha.split(' ')[1]);
        chartObjeto.data.datasets[0].data = registrosOnpe.map(r => r.actas);
        chartObjeto.data.datasets[1].data = registrosOnpe.map(r => r.candA);
        chartObjeto.data.datasets[2].data = registrosOnpe.map(r => r.candB);
        chartObjeto.update();
        
        renderizarTabla();
    }

    // Envío asíncrono a Google Sheets por medio de tu API Web App de Google Apps Script
    function transferirDatosAGoogleExcel() {
        const urlDestino = document.getElementById('scriptUrl').value.trim();
        if (!urlDestino) { alert("Por favor ingresa una URL válida de Apps Script."); return; }

        const filasPendientes = registrosOnpe.filter(r => !r.sync);
        if (filasPendientes.length === 0) { alert("No hay nuevas actualizaciones pendientes de envío."); return; }

        let promesasEnvio = filasPendientes.map(elemento => {
            return fetch(urlDestino, {
                method: 'POST',
                mode: 'no-cors', // Permite saltar barreras CORS entre GitHub y Google Scripts
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(elemento)
            }).then(() => {
                elemento.sync = true;
            }).catch(err => console.log("Fallo en red al procesar ítem ID: " + elemento.id, err));
        });

        Promise.all(promesasEnvio).then(() => {
            localStorage.setItem('registros_onpe_data', JSON.stringify(registrosOnpe));
            renderizarTabla();
            alert("¡Sincronización Completa! Los datos ya se reflejan en tu Google Sheets.");
        });
    }

    window.onload = function() {
        iniciarComponenteGrafico();
        renderizarTabla();
    };
</script>
</body>
</html>
