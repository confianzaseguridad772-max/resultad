<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoreo Electoral REAL ONPE</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f7fafc; margin: 0; padding: 20px; color: #2d3748; }
        .container { max-width: 1100px; margin: 0 auto; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h1 { color: #1a365d; text-align: center; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #718096; margin-bottom: 25px; font-size: 14px; }
        .config-card { background-color: #ebf8ff; border: 1px solid #bee3f8; padding: 15px; border-radius: 6px; margin-bottom: 20px; }
        input[type="text"] { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #cbd5e0; border-radius: 4px; box-sizing: border-box; background-color: #edf2f7; color: #4a5568; }
        .actions-bar { display: flex; gap: 15px; margin-bottom: 25px; }
        button { flex: 1; padding: 12px; font-weight: bold; border: none; border-radius: 4px; cursor: pointer; color: white; font-size: 14px; transition: background 0.2s; }
        .btn-update { background-color: #e53e3e; } .btn-update:hover { background-color: #c53030; }
        .btn-excel { background-color: #38a169; } .btn-excel:hover { background-color: #2f855a; }
        .canvas-holder { position: relative; height: 400px; margin-bottom: 30px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; text-align: center; }
        th, td { padding: 10px; border-bottom: 1px solid #e2e8f0; font-size: 14px; }
        th { background-color: #edf2f7; color: #4a5568; }
        .badge { padding: 3px 8px; border-radius: 12px; font-size: 11px; font-weight: bold; }
        .synced { background-color: #c6f6d5; color: #22543d; }
        .pending { background-color: #feebc8; color: #744210; }
    </style>
</head>
<body>

<div class="container">
    <h1>Análisis de Avance Electoral REAL (ONPE)</h1>
    <p class="subtitle">Conexión en vivo puenteada por Google Apps Script libre de bloqueos CORS</p>

    <div class="config-card">
        <label style="font-weight: bold; color: #2c5282;">URL de Google Apps Script Vinculada:</label>
        <input type="text" id="scriptUrl" value="https://script.google.com/macros/s/AKfycbxNrzJAtkkIS3-ZeIiIKdszhqSQag4okqGSFPsXDpmUsCa_iX8Hwcb4HdsY-DjZxHVJ/exec" readonly>
    </div>

    <div class="actions-bar">
        <button class="btn-update" onclick="adquirirNuevaActualizacion()">⚡ Consultar Datos Reales de la ONPE</button>
        <button class="btn-excel" onclick="transferirDatosAGoogleExcel()">📤 Exportar Pendientes a Google Excel</button>
    </div>

    <div class="canvas-holder">
        <canvas id="graficoOnpe"></canvas>
    </div>

    <h3>Registro de Datos Reales (Últimas 20 Transmisiones)</h3>
    <table id="tablaDatos">
        <thead>
            <tr>
                <th>Iteración</th>
                <th>Fecha y Hora</th>
                <th>% Actas Procesadas</th>
                <th>% Sánchez Palomino</th>
                <th>% Keiko Fujimori</th>
                <th>Estado Sincronización</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script>
    let registrosOnpe = JSON.parse(localStorage.getItem('registros_onpe_data')) || [];
    let chartObjeto;

    function iniciarComponenteGrafico() {
        const ctx = document.getElementById('graficoOnpe').getContext('2d');
        chartObjeto = new Chart(ctx, {
            type: 'line',
            data: {
                labels: registrosOnpe.map(r => r.fecha.split(' ')[1] || ''),
                datasets: [
                    { label: '% Actas Procesadas', data: registrosOnpe.map(r => r.actas), borderColor: '#3182ce', backgroundColor: 'rgba(49,130,206,0.05)', tension: 0.4, yAxisID: 'yActas' },
                    { label: '% Sánchez Palomino', data: registrosOnpe.map(r => r.candA), borderColor: '#004477', tension: 0.4, yAxisID: 'yVotos' },
                    { label: '% Keiko Fujimori', data: registrosOnpe.map(r => r.candB), borderColor: '#ff6600', tension: 0.4, yAxisID: 'yVotos' }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    yActas: { type: 'linear', position: 'left', title: { display: true, text: 'Progreso de Actas (%)' }, min: 90, max: 100 },
                    yVotos: { type: 'linear', position: 'right', title: { display: true, text: 'Votos Válidos (%)' }, min: 45, max: 55, grid: { drawOnChartArea: false } }
                }
            }
        });
    }

    function renderizarTabla() {
        const tbody = document.querySelector("#tablaDatos tbody");
        tbody.innerHTML = "";
        if(registrosOnpe.length === 0) {
            tbody.innerHTML = "<tr><td colspan='6'>No hay datos registrados todavía. Haz clic en el botón rojo.</td></tr>";
            return;
        }
        [...registrosOnpe].reverse().forEach(r => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${r.id}</td>
                <td>${r.fecha}</td>
                <td><b>${r.actas}%</b></td>
                <td style="color:#004477">${r.candA}%</td>
                <td style="color:#ff6600">${r.candB}%</td>
                <td><span class="badge ${r.sync ? 'synced' : 'pending'}">${r.sync ? 'En Excel' : 'Pendiente'}</span></td>
            `;
            tbody.appendChild(row);
        });
    }

    // LLAMADA REAL: Usa Google Script para saltarse el CORS y traer los datos verdaderos de la ONPE
    function adquirirNuevaActualizacion() {
        const urlScript = document.getElementById('scriptUrl').value.trim();
        
        // Animación temporal en el botón
        const btn = document.querySelector(".btn-update");
        const btnOriginalText = btn.innerText;
        btn.innerText = "Conectando con Servidores ONPE...";
        btn.disabled = true;

        fetch(urlScript)
        .then(response => response.json())
        .then(dataReal => {
            const fechaActual = new Date();
            const fechaTexto = `${fechaActual.toLocaleDateString('es-PE')} ${fechaActual.toTimeString().substring(0,5)}`;
            const nuevoId = registrosOnpe.length > 0 ? registrosOnpe[registrosOnpe.length - 1].id + 1 : 1;

            // Evitamos duplicar registros idénticos consecutivos en la gráfica
            if(registrosOnpe.length > 0 && registrosOnpe[registrosOnpe.length - 1].actas === dataReal.actas) {
                alert("La ONPE no ha lanzado ninguna actualización nueva en los últimos minutos. Sigue mostrando: " + dataReal.actas + "%");
                return;
            }

            registrosOnpe.push({
                id: nuevoId,
                fecha: fechaTexto,
                actas: dataReal.actas,
                candA: dataReal.candA,
                candB: dataReal.candB,
                sync: false
            });

            if (registrosOnpe.length > 20) { registrosOnpe.shift(); }

            localStorage.setItem('registros_onpe_data', JSON.stringify(registrosOnpe));
            
            // Actualizar la Curva
            chartObjeto.data.labels = registrosOnpe.map(r => r.fecha.split(' ')[1]);
            chartObjeto.data.datasets[0].data = registrosOnpe.map(r => r.actas);
            chartObjeto.data.datasets[1].data = registrosOnpe.map(r => r.candA);
            chartObjeto.data.datasets[2].data = registrosOnpe.map(r => r.candB);
            chartObjeto.update();
            
            renderizarTabla();
        })
        .catch(err => {
            console.error(err);
            alert("Error de conexión. Asegúrate de haber publicado los cambios de tu Apps Script como una 'Nueva Versión'.");
        })
        .finally(() => {
            btn.innerText = btnOriginalText;
            btn.disabled = false;
        });
    }

    function transferirDatosAGoogleExcel() {
        const urlDestino = document.getElementById('scriptUrl').value.trim();
        const filasPendientes = registrosOnpe.filter(r => !r.sync);
        if (filasPendientes.length === 0) { alert("No hay actualizaciones nuevas para mandar."); return; }

        let promesasEnvio = filasPendientes.map(elemento => {
            return fetch(urlDestino, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(elemento)
            }).then(() => { elemento.sync = true; });
        });

        Promise.all(promesasEnvio).then(() => {
            localStorage.setItem('registros_onpe_data', JSON.stringify(registrosOnpe));
            renderizarTabla();
            alert("¡Sincronizado! Revisa tu documento Excel.");
        });
    }

    window.onload = function() {
        iniciarComponenteGrafico();
        renderizarTabla();
    };
</script>
</body>
</html>
